<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atmos</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000000;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'JetBrains Mono', monospace;
  }

  .atmosphere {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .atmo-layer {
    position: absolute;
    inset: 0;
  }

  .atmo-layer-1 {
    background: radial-gradient(ellipse 80% 60% at 50% 120%, rgba(30, 58, 138, 0.15) 0%, transparent 70%);
  }

  .atmo-layer-2 {
    background: radial-gradient(ellipse 60% 40% at 50% 130%, rgba(59, 130, 246, 0.08) 0%, transparent 60%);
  }

  .atmo-layer-3 {
    background: radial-gradient(ellipse 100% 50% at 50% 110%, rgba(15, 23, 42, 0.9) 0%, transparent 50%);
  }

  .atmo-glow {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.07;
    z-index: 0;
    pointer-events: none;
  }

  .atmo-glow-1 {
    background: #3b82f6;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: glowPulse 8s ease-in-out infinite;
  }

  .atmo-glow-2 {
    background: #6366f1;
    top: 40%;
    left: 45%;
    transform: translate(-50%, -50%) scale(0.8);
    animation: glowPulse 10s ease-in-out infinite reverse;
  }

  @keyframes glowPulse {
    0%, 100% { opacity: 0.05; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.12; transform: translate(-50%, -50%) scale(1.15); }
  }

  .noise {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 128px 128px;
  }

  .scanlines {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background: linear-gradient(to bottom, transparent 0%, transparent 50%, rgba(0,0,0,0.03) 50%, rgba(0,0,0,0.03) 100%);
    background-size: 100% 4px;
  }

  #particles {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 100;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .text-stage {
    position: relative;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .text-atmos, .text-coming {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
  }

  .text-atmos {
    font-size: clamp(48px, 10vw, 120px);
    font-weight: 700;
    letter-spacing: -0.04em;
    color: #ffffff;
    text-shadow: 0 0 60px rgba(59, 130, 246, 0.15), 0 0 120px rgba(59, 130, 246, 0.05);
  }

  .text-coming {
    font-size: clamp(20px, 4vw, 48px);
    font-weight: 300;
    letter-spacing: 0.08em;
    color: #64748b;
    opacity: 0;
    transform: translateY(10px);
  }

  .text-atmos .letter {
    display: inline-block;
    transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                transform 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                filter 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform, opacity;
  }

  .text-atmos.merging .letter {
    opacity: 0;
    filter: blur(8px);
  }

  .text-atmos.merging .letter:nth-child(1) { transform: translate(-40px, -30px) scale(0.8); transition-delay: 0s; }
  .text-atmos.merging .letter:nth-child(2) { transform: translate(20px, 40px) scale(0.6); transition-delay: 0.08s; }
  .text-atmos.merging .letter:nth-child(3) { transform: translate(-10px, -50px) scale(0.7); transition-delay: 0.16s; }
  .text-atmos.merging .letter:nth-child(4) { transform: translate(50px, 20px) scale(0.5); transition-delay: 0.24s; }
  .text-atmos.merging .letter:nth-child(5) { transform: translate(-30px, 30px) scale(0.9); transition-delay: 0.32s; }

  .text-atmos.returning .letter {
    opacity: 1;
    filter: blur(0px);
    transform: translate(0, 0) scale(1);
  }

  .text-atmos.returning .letter:nth-child(1) { transition-delay: 0.4s; }
  .text-atmos.returning .letter:nth-child(2) { transition-delay: 0.48s; }
  .text-atmos.returning .letter:nth-child(3) { transition-delay: 0.56s; }
  .text-atmos.returning .letter:nth-child(4) { transition-delay: 0.64s; }
  .text-atmos.returning .letter:nth-child(5) { transition-delay: 0.72s; }

  .text-coming.visible {
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.5s,
                transform 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.5s;
  }

  .text-coming.hiding {
    opacity: 0;
    transform: translateY(-10px);
    transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1) 0s,
                transform 0.4s cubic-bezier(0.4, 0, 0.2, 1) 0s;
  }

  .dot-pulse {
    display: inline-block;
    animation: dotBlink 1.5s ease-in-out infinite;
  }
  .dot-pulse:nth-child(2) { animation-delay: 0.3s; }
  .dot-pulse:nth-child(3) { animation-delay: 0.6s; }

  @keyframes dotBlink {
    0%, 60%, 100% { opacity: 0.2; }
    30% { opacity: 1; }
  }

  .bottom-left {
    position: fixed;
    bottom: 32px;
    left: 32px;
    z-index: 100;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 400;
    color: #334155;
    letter-spacing: 0.05em;
    user-select: none;
  }

  .line-accent {
    position: fixed;
    bottom: 52px;
    left: 32px;
    width: 24px;
    height: 1px;
    background: linear-gradient(to right, #1e3a5f, transparent);
    z-index: 100;
  }

  .orbit-ring {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 500px;
    height: 500px;
    border: 1px solid rgba(59, 130, 246, 0.04);
    border-radius: 50%;
    z-index: 0;
    pointer-events: none;
    animation: orbitSpin 60s linear infinite;
  }

  .orbit-ring::after {
    content: '';
    position: absolute;
    top: -2px;
    left: 50%;
    width: 4px;
    height: 4px;
    background: rgba(59, 130, 246, 0.2);
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(59, 130, 246, 0.3);
  }

  .orbit-ring-2 {
    width: 700px;
    height: 700px;
    border-color: rgba(99, 102, 241, 0.025);
    animation-duration: 90s;
    animation-direction: reverse;
  }

  @keyframes orbitSpin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }

  .corner {
    position: fixed;
    width: 20px;
    height: 20px;
    z-index: 5;
    pointer-events: none;
  }
  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: rgba(59, 130, 246, 0.08);
  }
  .corner-tl { top: 24px; left: 24px; }
  .corner-tl::before { top: 0; left: 0; width: 20px; height: 1px; }
  .corner-tl::after { top: 0; left: 0; width: 1px; height: 20px; }
  .corner-tr { top: 24px; right: 24px; }
  .corner-tr::before { top: 0; right: 0; width: 20px; height: 1px; }
  .corner-tr::after { top: 0; right: 0; width: 1px; height: 20px; }
  .corner-br { bottom: 24px; right: 24px; }
  .corner-br::before { bottom: 0; right: 0; width: 20px; height: 1px; }
  .corner-br::after { bottom: 0; right: 0; width: 1px; height: 20px; }

  .top-label {
    position: fixed;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 400;
    color: #1e293b;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    user-select: none;
  }

  @media (max-width: 768px) {
    .orbit-ring { width: 300px; height: 300px; }
    .orbit-ring-2 { width: 420px; height: 420px; }
    .bottom-left { bottom: 20px; left: 20px; font-size: 11px; }
    .line-accent { bottom: 40px; left: 20px; }
    .corner { display: none; }
  }
</style>
</head>
<body>

  <div class="atmosphere">
    <div class="atmo-layer atmo-layer-1"></div>
    <div class="atmo-layer atmo-layer-2"></div>
    <div class="atmo-layer atmo-layer-3"></div>
  </div>

  <div class="atmo-glow atmo-glow-1"></div>
  <div class="atmo-glow atmo-glow-2"></div>

  <div class="noise"></div>
  <div class="scanlines"></div>

  <canvas id="particles"></canvas>

  <div class="orbit-ring"></div>
  <div class="orbit-ring orbit-ring-2"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-br"></div>

  <div class="top-label">earth · atmosphere · system</div>

  <div class="content">
    <div class="text-stage">
      <div class="text-atmos" id="textAtmos">
        <span class="letter">A</span><span class="letter">t</span><span class="letter">m</span><span class="letter">o</span><span class="letter">s</span>
      </div>
      <div class="text-coming" id="textComing">
        Coming soon<span class="dot-pulse">.</span><span class="dot-pulse">.</span><span class="dot-pulse">.</span>
      </div>
    </div>
  </div>

  <div class="line-accent"></div>
  <div class="bottom-left">infastracture</div>

<script>
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let w, h;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * w;
      this.y = Math.random() * h;
      this.size = Math.random() * 1.5 + 0.3;
      this.speedX = (Math.random() - 0.5) * 0.15;
      this.speedY = -Math.random() * 0.3 - 0.05;
      this.opacity = Math.random() * 0.3 + 0.05;
      this.fadeSpeed = Math.random() * 0.002 + 0.001;
      this.life = Math.random();
      this.growing = Math.random() > 0.5;
    }
    update() {
      this.x += this.speedX;
      this.y += this.speedY;
      if (this.growing) {
        this.life += this.fadeSpeed;
        if (this.life >= 1) this.growing = false;
      } else {
        this.life -= this.fadeSpeed;
        if (this.life <= 0) this.reset();
      }
      if (this.y < -10 || this.x < -10 || this.x > w + 10) this.reset();
    }
    draw() {
      const alpha = this.opacity * this.life;
      if (alpha <= 0) return;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(148,163,184,${alpha})`;
      ctx.fill();
    }
  }

  for (let i = 0; i < 80; i++) particles.push(new Particle());

  function animateParticles() {
    ctx.clearRect(0, 0, w, h);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animateParticles);
  }
  animateParticles();

  const textAtmos = document.getElementById('textAtmos');
  const textComing = document.getElementById('textComing');

  function mergeToComingSoon() {
    textAtmos.classList.remove('returning');
    textAtmos.classList.add('merging');
    textComing.classList.remove('hiding');
    textComing.classList.add('visible');
  }

  function returnToAtmos() {
    textComing.classList.remove('visible');
    textComing.classList.add('hiding');
    textAtmos.classList.remove('merging');
    textAtmos.classList.add('returning');
  }

  function startCycle() {
    setTimeout(() => {
      mergeToComingSoon();
      setTimeout(() => {
        returnToAtmos();
        setTimeout(startCycle, 1200);
      }, 4000);
    }, 2500);
  }

  startCycle();
</script>

</body>
</html>
