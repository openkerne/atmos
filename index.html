<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>infastracture — Start</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            user-select: none;
        }

        body {
            background: linear-gradient(336deg, #188efc, #002271, #0023d6);
            background-size: 600% 600%;
            -webkit-animation: AnimationName 16s ease infinite;
            -moz-animation: AnimationName 16s ease infinite;
            -o-animation: AnimationName 16s ease infinite;
            animation: AnimationName 16s ease infinite;
        }

        @-webkit-keyframes AnimationName {
            0% { background-position: 0% 4% }
            50% { background-position: 100% 97% }
            100% { background-position: 0% 4% }
        }
        @-moz-keyframes AnimationName {
            0% { background-position: 0% 4% }
            50% { background-position: 100% 97% }
            100% { background-position: 0% 4% }
        }
        @-o-keyframes AnimationName {
            0% { background-position: 0% 4% }
            50% { background-position: 100% 97% }
            100% { background-position: 0% 4% }
        }
        @keyframes AnimationName {
            0% { background-position: 0% 4% }
            50% { background-position: 100% 97% }
            100% { background-position: 0% 4% }
        }

        .start-screen {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 30px;
            z-index: 100;
            pointer-events: none;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 16px;
            pointer-events: auto;
        }

        .user-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.15s;
        }
        .user-avatar:hover {
            background: rgba(255,255,255,0.25);
        }
        .user-avatar svg {
            width: 18px;
            height: 18px;
            fill: rgba(255,255,255,0.9);
        }

        .datetime {
            text-align: right;
            color: rgba(255,255,255,0.9);
            font-weight: 300;
            line-height: 1.3;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            transition: background 0.15s;
        }
        .datetime:hover {
            background: rgba(255,255,255,0.1);
        }
        .datetime .time {
            font-size: 16px;
            letter-spacing: 0.5px;
        }
        .datetime .date {
            font-size: 12px;
            opacity: 0.7;
        }

        .brand {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            z-index: 100;
        }

        .tile-area {
            flex: 1;
            display: flex;
            align-items: center;
            padding-left: 80px;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
        }
        .tile-area::-webkit-scrollbar {
            display: none;
        }

        .tile-grid {
            display: grid;
            grid-template-columns: repeat(6, 120px);
            grid-auto-rows: 120px;
            gap: 8px;
            flex-shrink: 0;
        }

        .tile {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 14px;
            cursor: pointer;
            overflow: hidden;
            transition: background 0.12s ease;
            text-decoration: none;
        }

        .tile .tile-label {
            font-size: 13px;
            font-weight: 400;
            color: #fff;
            line-height: 1.2;
            position: relative;
            z-index: 2;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }

        .tile .tile-icon {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 2;
        }

        .tile-atmos {
            grid-column: span 2;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.12);
        }
        .tile-atmos:hover {
            background: rgba(255, 255, 255, 0.28);
        }
        .tile-atmos:active {
            background: rgba(255, 255, 255, 0.14);
        }

        .tile-gray {
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .tile-gray:hover {
            background: rgba(0, 0, 0, 0.35);
            border-color: rgba(255,255,255,0.12);
        }
        .tile-gray:active {
            background: rgba(0, 0, 0, 0.2);
        }

        .tile-contribute {
            grid-column: span 2;
            background: rgba(0, 180, 80, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 220, 100, 0.15);
        }
        .tile-contribute:hover {
            background: rgba(0, 180, 80, 0.45);
            border-color: rgba(0, 220, 100, 0.25);
        }
        .tile-contribute:active {
            background: rgba(0, 180, 80, 0.22);
        }

        .tile-dark {
            background: rgba(0, 0, 0, 0.12);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.04);
            cursor: default;
        }

        .tile-small {
            grid-row: span 1;
            grid-column: span 1;
        }

        .tile-wide {
            grid-column: span 2;
        }

        /* Modal shared */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 10, 40, 0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: rgba(10, 20, 50, 0.95);
            border: 1px solid rgba(255,255,255,0.1);
            width: 440px;
            max-width: 90vw;
            padding: 0;
            transform: scale(0.95) translateY(10px);
            transition: transform 0.2s ease;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
        }
        .modal-overlay.active .modal-box {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            padding: 20px 24px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            color: #fff;
            font-size: 15px;
            font-weight: 400;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            border-radius: 2px;
            transition: background 0.12s, color 0.12s;
            font-size: 18px;
        }
        .modal-close:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .modal-body {
            padding: 0 24px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .modal-icon-large {
            width: 64px;
            height: 64px;
            background: rgba(255,255,255,0.07);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 4px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .modal-icon-large svg {
            fill: rgba(255,255,255,0.4);
            width: 32px;
            height: 32px;
        }

        .modal-coming-soon {
            color: rgba(255,255,255,0.45);
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .modal-app-name {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            font-weight: 400;
        }

        .modal-sub {
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            text-align: center;
            line-height: 1.6;
            max-width: 280px;
        }

        /* Donate modal specifics */
        .donate-intro {
            color: rgba(255,255,255,0.35);
            font-size: 12px;
            text-align: center;
            line-height: 1.6;
            max-width: 300px;
            margin-top: 4px;
        }

        .donate-options {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-top: 4px;
        }

        .donate-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 16px 10px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 3px;
            cursor: pointer;
            transition: background 0.12s, border-color 0.12s, transform 0.1s;
            text-decoration: none;
        }
        .donate-btn:hover {
            background: rgba(0, 180, 80, 0.2);
            border-color: rgba(0, 220, 100, 0.3);
            transform: translateY(-2px);
        }
        .donate-btn:active {
            background: rgba(0, 180, 80, 0.15);
            transform: translateY(0);
        }

        .donate-amount {
            color: #fff;
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .donate-label {
            color: rgba(255,255,255,0.35);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Custom amount row */
        .donate-custom {
            display: flex;
            width: 100%;
            gap: 10px;
            margin-top: 2px;
        }

        .donate-custom-input-wrap {
            flex: 1;
            position: relative;
        }

        .donate-custom-input-wrap .dollar-sign {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.35);
            font-size: 16px;
            font-weight: 300;
            pointer-events: none;
        }

        .donate-custom-input {
            width: 100%;
            padding: 14px 14px 14px 30px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 3px;
            color: #fff;
            font-size: 16px;
            font-weight: 300;
            font-family: 'Segoe UI', 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.15s, background 0.15s;
        }
        .donate-custom-input::placeholder {
            color: rgba(255,255,255,0.2);
        }
        .donate-custom-input:focus {
            border-color: rgba(0, 220, 100, 0.4);
            background: rgba(255,255,255,0.08);
        }

        .donate-custom-btn {
            padding: 14px 24px;
            background: rgba(0, 180, 80, 0.25);
            border: 1px solid rgba(0, 220, 100, 0.2);
            border-radius: 3px;
            color: #fff;
            font-size: 13px;
            font-weight: 400;
            font-family: 'Segoe UI', 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.12s, border-color 0.12s, transform 0.1s;
            white-space: nowrap;
        }
        .donate-custom-btn:hover {
            background: rgba(0, 180, 80, 0.4);
            border-color: rgba(0, 220, 100, 0.35);
            transform: translateY(-1px);
        }
        .donate-custom-btn:active {
            background: rgba(0, 180, 80, 0.2);
            transform: translateY(0);
        }

        .donate-error {
            color: rgba(255, 100, 100, 0.8);
            font-size: 11px;
            height: 0;
            overflow: hidden;
            transition: height 0.2s, opacity 0.2s;
            opacity: 0;
        }
        .donate-error.visible {
            height: 18px;
            opacity: 1;
        }

        .donate-footer {
            color: rgba(255,255,255,0.2);
            font-size: 11px;
            text-align: center;
            margin-top: 2px;
        }

        .donate-footer svg {
            width: 14px;
            height: 14px;
            fill: rgba(255,255,255,0.25);
            vertical-align: middle;
            margin-right: 4px;
            position: relative;
            top: -1px;
        }

        .tile-contribute::before {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -10%;
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, rgba(0, 220, 100, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        .scroll-hint {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.2);
            font-size: 28px;
            z-index: 50;
            animation: scrollPulse 2s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes scrollPulse {
            0%, 100% { opacity: 0.2; transform: translateY(-50%) translateX(0); }
            50% { opacity: 0.5; transform: translateY(-50%) translateX(5px); }
        }

        .tile svg {
            fill: rgba(255,255,255,0.9);
            width: 28px;
            height: 28px;
        }

        .tile-atmos::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        @media (max-width: 900px) {
            .tile-area {
                padding-left: 30px;
                align-items: flex-start;
                padding-top: 80px;
            }
            .tile-grid {
                grid-template-columns: repeat(4, 100px);
                grid-auto-rows: 100px;
            }
            .tile-atmos,
            .tile-contribute {
                grid-column: span 2;
            }
        }

        @media (max-width: 500px) {
            .tile-grid {
                grid-template-columns: repeat(2, 100px);
                grid-auto-rows: 100px;
            }
            .tile-atmos,
            .tile-contribute {
                grid-column: span 2;
            }
            .donate-options {
                flex-direction: column;
            }
        }
    </style>
</head>

    <script>
        function updateClock() {
            const now = new Date();
            const h = now.getHours().toString().padStart(2, '0');
            const m = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').textContent = h + ':' + m;
            const options = { weekday: 'short', month: 'short', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', options);
        }
        updateClock();
        setInterval(updateClock, 10000);

        const appIcons = {
            proboot: '<svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg>',
            inSeaBIOS: '<svg viewBox="0 0 24 24"><path d="M20 18c1.1 0 1.99-.9 1.99-2L22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/></svg>',
            HLinux: '<svg viewBox="0 0 24 24"><path d="M20.55 5.22a1 1 0 0 0-1.02-.24l-3.53.94-.94-3.53a1 1 0 0 0-1.3-.66 1 1 0 0 0-.66 1.3l.94 3.53-3.53.94.94-3.53a1 1 0 0 0-1.96-.44l-1.42 5.3-5.3 1.42a1 1 0 1 0 .52 1.93l3.53-.94-.94 3.53 3.53-.94-.94 3.53a1 1 0 1 0 1.93.52l1.42-5.3 3.53-.94-1.42 5.3a1 1 0 1 0 1.93.52l1.42-5.3 5.3-1.42a1 1 0 0 0-.52-1.93l-3.53.94.94-3.53 3.53-.94a1 1 0 0 0 .44-1.46z"/></svg>'
        };

        const appDescriptions = {
            proboot: 'Coreboot port for the 4530s.',
            inSeaBIOS: 'Open-source firmware implementation for x86 systems.',
            HLinux: 'A distribution based from scratch made by the community.'
        };

        function openModal(appName) {
            const modal = document.getElementById('modal');
            document.getElementById('modal-title').textContent = appName;
            document.getElementById('modal-app-name').textContent = appName;
            document.getElementById('modal-icon').innerHTML = appIcons[appName] || '';
            document.getElementById('modal-sub').textContent = appDescriptions[appName] || 'This application is currently under development. Check back later for updates.';
            modal.classList.add('active');
        }

        function closeModal(e) {
            if (e.target === e.currentTarget) {
                document.getElementById('modal').classList.remove('active');
            }
        }

        function closeModalDirect() {
            document.getElementById('modal').classList.remove('active');
        }

        function openDonateModal() {
            document.getElementById('donate-modal').classList.add('active');
            document.getElementById('donate-error').classList.remove('visible');
            document.getElementById('custom-amount').value = '';
        }

        function closeDonateModal(e) {
            if (e.target === e.currentTarget) {
                document.getElementById('donate-modal').classList.remove('active');
            }
        }

        function closeDonateModalDirect() {
            document.getElementById('donate-modal').classList.remove('active');
        }

        function donateCustom() {
            const input = document.getElementById('custom-amount');
            const error = document.getElementById('donate-error');
            const val = parseFloat(input.value);

            if (!val || val < 1 || isNaN(val)) {
                error.classList.add('visible');
                input.style.borderColor = 'rgba(255, 100, 100, 0.5)';
                return;
            }

            error.classList.remove('visible');
            input.style.borderColor = '';
            const rounded = Math.round(val * 100) / 100;
            window.open('https://paypal.me/AhmedElamir76/' + rounded, '_blank', 'noopener');
        }

        // Clear error on input
        document.getElementById('custom-amount').addEventListener('input', function() {
            document.getElementById('donate-error').classList.remove('visible');
            this.style.borderColor = '';
        });

        // Enter key to donate
        document.getElementById('custom-amount').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                donateCustom();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.getElementById('modal').classList.remove('active');
                document.getElementById('donate-modal').classList.remove('active');
            }
        });
    </script>
